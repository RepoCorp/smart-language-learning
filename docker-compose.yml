services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart_language_learning
      POSTGRES_USER: smart_language_learning
      POSTGRES_PASSWORD: smart_language_learning
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_language_learning -d smart_language_learning"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: dev-secret-key
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: smart_language_learning
      POSTGRES_USER: smart_language_learning
      POSTGRES_PASSWORD: smart_language_learning
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_QUESTION_MODEL: ${OPENAI_QUESTION_MODEL:-gpt-4o-mini}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      AWS_PROFILE: ${AWS_PROFILE:-default}
      AWS_SDK_LOAD_CONFIG: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro
    command: ["/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  pg_data:
